<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tempest-Style Web Shooter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas"></canvas>

    <div id="hud">
      <div id="hudScore" class="hud-item">Score: 0</div>
      <div id="hudLives" class="hud-item">Lives: 3</div>
      <div id="hudLevel" class="hud-item">Level: 1</div>
      <div id="hudBlaster" class="hud-item">Blaster: 3</div>
      <div id="hudProfile" class="hud-item">Profile: Standard</div>
    </div>

    <div id="titleOverlay" class="overlay">
      <h1>TEMPEST-STYLE WEB SHOOTER</h1>
      <p class="controls-hint">
        Move mouse left/right to rotate &middot; Left click to shoot &middot; Space = Super Blaster
      </p>

      <div id="difficultyPanel" class="difficulty-panel">
        <div id="profileSelector" class="profile-selector">
          <button type="button" class="profile-button" data-profile="Relaxed">Relaxed</button>
          <button type="button" class="profile-button" data-profile="Standard">Standard</button>
          <button type="button" class="profile-button" data-profile="Arcade">Arcade</button>
          <button type="button" class="profile-button" data-profile="Custom">Custom</button>
        </div>

        <div id="customPanel" class="custom-panel hidden">
          <label class="custom-slider">
            Enemy Speed
            <input type="range" id="customEnemySpeed" min="0.5" max="1.6" step="0.05" />
          </label>
          <label class="custom-slider">
            Spawn Rate
            <input type="range" id="customSpawnRate" min="0.5" max="1.6" step="0.05" />
          </label>
        </div>

        <label class="poles-toggle">
          <input type="checkbox" id="polesToggle" />
          Enemy Poles (experimental)
        </label>
      </div>

      <p class="start-hint">Click to Start</p>
    </div>

    <div id="levelClearOverlay" class="overlay hidden">
      <h1>LEVEL CLEAR</h1>
      <p id="levelClearBonus">Bonus: +0</p>
    </div>

    <div id="gameOverOverlay" class="overlay hidden">
      <h1>GAME OVER</h1>
      <p id="finalScore">Final Score: 0</p>
      <p class="start-hint">Click to Restart</p>
    </div>

    <div id="pauseOverlay" class="overlay hidden">
      <h1>PAUSED</h1>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
